
<ion-content [fullscreen]="true">
  <div class="screen">
    <!-- No se porque pero esto no se saca -->
    <div class="top-info">
      <ion-buttons class="back" slot="start">
        <ion-back-button (click)="goToLogin()"></ion-back-button>
      </ion-buttons>
    </div>

    <!-- Icono ave -->
    <div class="bird-icon">
      <div class="circle">
        <img src="assets/Bird-icon.png" alt="Bird">
        <img src="assets/bosque.png" alt="bosque" class="bosque">
      </div>
    </div>

    <!-- Texto bienvenida -->
    <div>
      <p class="center">Bienvenido a la Bird-dex</p>
    </div>

    <!-- boton -->
    <ion-fab-button [routerLink]="['/catalogo']">
      <ion-icon name="chevron-forward"></ion-icon>
    </ion-fab-button>

    <!-- Plantas -->
    <div class="content-wrapper">
      <img src="assets/planta-izq.png" alt="Planta" class="planta">
      <img src="assets/planta-der.png" alt="Planta" class="planta">
    </div>

  </div>
</ion-content>
